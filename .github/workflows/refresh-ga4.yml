# しっぽり亭 管理ダッシュボードのGA4データを定期取得して site/data/ga4.json を更新する。
# 変更があればコミット → pages-preview.yml が site/** の push を検知して自動デプロイ。
# 必要なシークレット（リポジトリ Settings → Secrets and variables → Actions）:
#   GA4_PROPERTY_ID … GA4プロパティID（例 543139933）
#   GA4_SA_KEY      … GA4閲覧権限を付けたサービスアカウント鍵JSONの「中身まるごと」
name: Refresh GA4 dashboard data

on:
  schedule:
    - cron: '0 * * * *'   # 毎時0分（UTC）。GitHubの都合で数分ずれることあり＝実質ニアリアルタイム
  workflow_dispatch:        # 手動実行も可

permissions:
  contents: write

concurrency:
  group: refresh-ga4
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Fetch GA4 data
        working-directory: site
        env:
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          GA4_SA_KEY: ${{ secrets.GA4_SA_KEY }}
        run: node scripts/fetch-ga4.mjs
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- site/data/ga4.json; then
            echo "変更なし。コミットをスキップ。"
          else
            git add site/data/ga4.json
            git commit -m "chore(dashboard): GA4データ自動更新"
            git push
          fi
