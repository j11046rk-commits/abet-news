# しっぽり亭サイトの「確認用」プレビューを GitHub Pages に公開するワークフロー。
# 本番は Cloudflare Pages を使う想定。これは出先などでスマホからデザインを
# 確認するための一時プレビュー（URL: https://<ユーザー名>.github.io/abet-news/）。
name: Preview (GitHub Pages)

on:
  push:
    branches:
      - main
      - claude/shipporitei-official-site-umht7v
    paths:
      - 'site/**'
      - '.github/workflows/pages-preview.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - run: npm ci
      - name: Build (sub-path for Pages)
        env:
          SITE_URL: ${{ steps.pages.outputs.origin }}
          BASE_PATH: ${{ steps.pages.outputs.base_path }}
          DASHBOARD_PASSWORD: ${{ secrets.DASHBOARD_PASSWORD }}
        run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
