name: Daily A-BET News

on:
  schedule:
    # 毎朝7:00 JST = 22:00 UTC（前日）
    - cron: '0 22 * * *'
  workflow_dispatch:  # 手動実行も可能

jobs:
  build-and-send:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install system dependencies (fonts + WeasyPrint deps)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            fonts-noto-cjk \
            fonts-noto-cjk-extra \
            libpango-1.0-0 \
            libpangoft2-1.0-0 \
            libharfbuzz-subset0

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run A-BET News pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LARK_WEBHOOK_URL: ${{ secrets.LARK_WEBHOOK_URL }}
          LARK_APP_ID: ${{ secrets.LARK_APP_ID }}
          LARK_APP_SECRET: ${{ secrets.LARK_APP_SECRET }}
          LARK_CHAT_ID: ${{ secrets.LARK_CHAT_ID }}
          LARK_DOMAIN: ${{ secrets.LARK_DOMAIN }}
        run: |
          cd scripts && python main.py

      - name: Upload PDF artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: abet-news-pdf-${{ github.run_id }}
          path: scripts/output/*.pdf
          retention-days: 30
