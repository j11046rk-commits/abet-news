<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 120" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a3a3a"/>
      <stop offset="100%" stop-color="#2d5050"/>
    </linearGradient>
  </defs>
  <rect width="200" height="120" fill="url(#bg4)"/>
  <!-- 工場ライン -->
  <g fill="#7b2cbf">
    <rect x="10" y="80" width="180" height="3"/>
  </g>
  <!-- ロボットアーム -->
  <g stroke="#fff" stroke-width="2" fill="none">
    <line x1="60" y1="80" x2="60" y2="40"/>
    <line x1="60" y1="40" x2="100" y2="30"/>
    <line x1="100" y1="30" x2="115" y2="50"/>
  </g>
  <circle cx="60" cy="80" r="5" fill="#7b2cbf"/>
  <circle cx="60" cy="40" r="3" fill="#7b2cbf"/>
  <circle cx="100" cy="30" r="3" fill="#7b2cbf"/>
  <rect x="110" y="48" width="10" height="6" fill="#7b2cbf"/>
  <!-- 製品（箱） -->
  <g fill="#fff" opacity="0.9">
    <rect x="130" y="65" width="12" height="15"/>
    <rect x="148" y="65" width="12" height="15"/>
    <rect x="166" y="65" width="12" height="15"/>
  </g>
  <g fill="#7b2cbf" opacity="0.7">
    <rect x="132" y="68" width="3" height="2"/>
    <rect x="138" y="68" width="3" height="2"/>
    <rect x="150" y="68" width="3" height="2"/>
    <rect x="156" y="68" width="3" height="2"/>
    <rect x="168" y="68" width="3" height="2"/>
    <rect x="174" y="68" width="3" height="2"/>
  </g>
  <!-- IoTドット -->
  <g fill="#7b2cbf" opacity="0.6">
    <circle cx="20" cy="20" r="2"/>
    <circle cx="40" cy="15" r="2"/>
    <circle cx="160" cy="20" r="2"/>
    <circle cx="180" cy="15" r="2"/>
  </g>
  <g stroke="#7b2cbf" stroke-width="0.5" stroke-dasharray="2,2" fill="none" opacity="0.5">
    <line x1="20" y1="20" x2="40" y2="15"/>
    <line x1="40" y1="15" x2="100" y2="30"/>
    <line x1="160" y1="20" x2="100" y2="30"/>
  </g>
</svg>
