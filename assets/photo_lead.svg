  <g fill="#ffd966" opacity="0.6">
    <rect x="545" y="215" width="5" height="5"/>
    <rect x="560" y="215" width="5" height="5"/>
    <rect x="575" y="215" width="5" height="5"/>
    <rect x="590" y="215" width="5" height="5"/>
    <rect x="545" y="230" width="5" height="5"/>
    <rect x="575" y="230" width="5" height="5"/>
    <rect x="560" y="245" width="5" height="5"/>
    <rect x="590" y="245" width="5" height="5"/>
    <rect x="545" y="260" width="5" height="5"/>
    <rect x="575" y="260" width="5" height="5"/>
    <rect x="560" y="275" width="5" height="5"/>
    <rect x="590" y="275" width="5" height="5"/>
  </g>

  <!-- データ通信ライン -->
  <g stroke="#7b2cbf" stroke-width="0.8" opacity="0.5" fill="none" stroke-dasharray="3,3">
    <path d="M150,140 Q300,90 480,150"/>
    <path d="M150,180 Q300,130 480,200"/>
    <path d="M250,200 Q400,150 555,210"/>
  </g>

  <!-- 通信ノードの光 -->
  <g fill="#7b2cbf">
    <circle cx="150" cy="140" r="3"/>
    <circle cx="480" cy="150" r="3"/>
    <circle cx="555" cy="210" r="2.5"/>
    <circle cx="250" cy="200" r="2.5"/>
  </g>
  <g fill="#fff">
    <circle cx="150" cy="140" r="1.5"/>
    <circle cx="480" cy="150" r="1.5"/>
  </g>

  <!-- 半透明オーバーレイ（新聞写真っぽい質感） -->
  <rect width="600" height="360" fill="#000" opacity="0.04"/>

  <!-- スキャンラインで新聞印刷感 -->
  <g stroke="#000" stroke-width="0.3" opacity="0.05">
    <line x1="0" y1="40" x2="600" y2="40"/>
    <line x1="0" y1="80" x2="600" y2="80"/>
    <line x1="0" y1="120" x2="600" y2="120"/>
    <line x1="0" y1="160" x2="600" y2="160"/>
    <line x1="0" y1="200" x2="600" y2="200"/>
    <line x1="0" y1="240" x2="600" y2="240"/>
    <line x1="0" y1="280" x2="600" y2="280"/>
    <line x1="0" y1="320" x2="600" y2="320"/>
  </g>
