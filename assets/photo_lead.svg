<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5b6f8a"/>
      <stop offset="60%" stop-color="#8ba0bd"/>
      <stop offset="100%" stop-color="#c4d3e6"/>
    </linearGradient>
    <linearGradient id="building1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2c3e52"/>
      <stop offset="100%" stop-color="#1a2733"/>
    </linearGradient>
    <linearGradient id="building2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3d5670"/>
      <stop offset="100%" stop-color="#2a3a4d"/>
    </linearGradient>
    <linearGradient id="building3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a6480"/>
      <stop offset="100%" stop-color="#34485e"/>
    </linearGradient>
    <radialGradient id="sun" cx="0.75" cy="0.25" r="0.15">
      <stop offset="0%" stop-color="#ffe4b3" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ffe4b3" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 空 -->
  <rect width="600" height="360" fill="url(#sky)"/>
  <!-- 太陽光 -->
  <ellipse cx="450" cy="80" rx="120" ry="80" fill="url(#sun)"/>

  <!-- 遠景の山並み -->
  <path d="M0,200 L60,170 L120,185 L200,150 L280,175 L380,140 L480,165 L600,145 L600,360 L0,360 Z"
        fill="#5d7290" opacity="0.6"/>

  <!-- スカイラインの建物群（データセンター風） -->
  <!-- 建物1 -->
  <rect x="20" y="180" width="60" height="180" fill="url(#building1)"/>
  <g fill="#ffd966" opacity="0.7">
    <rect x="28" y="195" width="6" height="6"/>
    <rect x="40" y="195" width="6" height="6"/>
    <rect x="52" y="195" width="6" height="6"/>
    <rect x="64" y="195" width="6" height="6"/>
    <rect x="28" y="210" width="6" height="6"/>
    <rect x="52" y="210" width="6" height="6"/>
    <rect x="64" y="210" width="6" height="6"/>
    <rect x="28" y="225" width="6" height="6"/>
    <rect x="40" y="225" width="6" height="6"/>
    <rect x="64" y="225" width="6" height="6"/>
    <rect x="28" y="240" width="6" height="6"/>
    <rect x="40" y="240" width="6" height="6"/>
    <rect x="52" y="240" width="6" height="6"/>
    <rect x="40" y="255" width="6" height="6"/>
    <rect x="52" y="255" width="6" height="6"/>
    <rect x="64" y="255" width="6" height="6"/>
    <rect x="28" y="270" width="6" height="6"/>
    <rect x="64" y="270" width="6" height="6"/>
    <rect x="28" y="285" width="6" height="6"/>
    <rect x="40" y="285" width="6" height="6"/>
    <rect x="52" y="285" width="6" height="6"/>
    <rect x="40" y="300" width="6" height="6"/>
    <rect x="64" y="300" width="6" height="6"/>
    <rect x="28" y="315" width="6" height="6"/>
    <rect x="52" y="315" width="6" height="6"/>
    <rect x="40" y="330" width="6" height="6"/>
    <rect x="64" y="330" width="6" height="6"/>
  </g>

  <!-- 建物2 メインのデータセンタータワー -->
  <rect x="100" y="120" width="100" height="240" fill="url(#building2)"/>
  <rect x="100" y="120" width="100" height="8" fill="#0a1420"/>
  <rect x="142" y="100" width="16" height="20" fill="#1a2733"/>
  <g fill="#7b2cbf" opacity="0.85">
    <rect x="110" y="140" width="8" height="8"/>
    <rect x="125" y="140" width="8" height="8"/>
    <rect x="155" y="140" width="8" height="8"/>
    <rect x="170" y="140" width="8" height="8"/>
    <rect x="185" y="140" width="8" height="8"/>
    <rect x="110" y="160" width="8" height="8"/>
    <rect x="140" y="160" width="8" height="8"/>
    <rect x="170" y="160" width="8" height="8"/>
    <rect x="125" y="180" width="8" height="8"/>
