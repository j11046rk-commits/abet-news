    <rect x="155" y="180" width="8" height="8"/>
    <rect x="185" y="180" width="8" height="8"/>
    <rect x="110" y="200" width="8" height="8"/>
    <rect x="125" y="200" width="8" height="8"/>
    <rect x="170" y="200" width="8" height="8"/>
    <rect x="185" y="200" width="8" height="8"/>
    <rect x="140" y="220" width="8" height="8"/>
    <rect x="170" y="220" width="8" height="8"/>
    <rect x="110" y="240" width="8" height="8"/>
    <rect x="125" y="240" width="8" height="8"/>
    <rect x="155" y="240" width="8" height="8"/>
    <rect x="185" y="240" width="8" height="8"/>
    <rect x="140" y="260" width="8" height="8"/>
    <rect x="170" y="260" width="8" height="8"/>
    <rect x="125" y="280" width="8" height="8"/>
    <rect x="155" y="280" width="8" height="8"/>
    <rect x="170" y="280" width="8" height="8"/>
    <rect x="110" y="300" width="8" height="8"/>
    <rect x="155" y="300" width="8" height="8"/>
    <rect x="185" y="300" width="8" height="8"/>
    <rect x="125" y="320" width="8" height="8"/>
    <rect x="170" y="320" width="8" height="8"/>
  </g>

  <!-- 建物3 -->
  <rect x="220" y="160" width="70" height="200" fill="url(#building3)"/>
  <g fill="#ffd966" opacity="0.7">
    <rect x="230" y="180" width="5" height="5"/>
    <rect x="245" y="180" width="5" height="5"/>
    <rect x="260" y="180" width="5" height="5"/>
    <rect x="275" y="180" width="5" height="5"/>
    <rect x="230" y="195" width="5" height="5"/>
    <rect x="260" y="195" width="5" height="5"/>
    <rect x="275" y="195" width="5" height="5"/>
