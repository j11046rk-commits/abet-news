    <rect x="275" y="300" width="5" height="5"/>
    <rect x="230" y="315" width="5" height="5"/>
    <rect x="260" y="315" width="5" height="5"/>
    <rect x="245" y="330" width="5" height="5"/>
    <rect x="275" y="330" width="5" height="5"/>
  </g>

  <!-- 建物4 -->
  <rect x="305" y="200" width="50" height="160" fill="url(#building1)"/>

  <!-- 建物5 後景 -->
  <rect x="370" y="180" width="80" height="180" fill="url(#building2)"/>
