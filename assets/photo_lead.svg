    <rect x="230" y="240" width="5" height="5"/>
    <rect x="245" y="240" width="5" height="5"/>
    <rect x="260" y="240" width="5" height="5"/>
    <rect x="245" y="255" width="5" height="5"/>
    <rect x="275" y="255" width="5" height="5"/>
    <rect x="230" y="270" width="5" height="5"/>
    <rect x="260" y="270" width="5" height="5"/>
    <rect x="275" y="270" width="5" height="5"/>
    <rect x="245" y="285" width="5" height="5"/>
    <rect x="260" y="285" width="5" height="5"/>
    <rect x="230" y="300" width="5" height="5"/>
