<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 120" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1929"/>
      <stop offset="100%" stop-color="#2c3e52"/>
    </linearGradient>
  </defs>
  <rect width="200" height="120" fill="url(#bg2)"/>

  <!-- モニター -->
  <rect x="50" y="20" width="100" height="65" rx="3" fill="#1a2733" stroke="#7b2cbf" stroke-width="1"/>
  <rect x="55" y="25" width="90" height="55" fill="#0a1929"/>
  <!-- スタンド -->
  <rect x="90" y="85" width="20" height="6" fill="#1a2733"/>
  <rect x="75" y="91" width="50" height="4" fill="#1a2733"/>

  <!-- 画面の中身：ターミナル風 -->
  <g font-family="monospace" font-size="5" fill="#7b2cbf">
    <text x="60" y="35">$ agent.run()</text>
    <text x="60" y="44">&gt; analyzing tasks...</text>
    <text x="60" y="53" fill="#9b59ff">&gt; executing 3/8</text>
    <text x="60" y="62" fill="#fff">&gt; ████████░░ 80%</text>
    <text x="60" y="71">&gt; complete</text>
  </g>

  <!-- ロボットハンド（簡易） -->
  <g transform="translate(15, 60)">
    <!-- アーム -->
    <rect x="0" y="20" width="35" height="6" fill="#7b2cbf" rx="1"/>
    <rect x="30" y="10" width="6" height="20" fill="#7b2cbf" rx="1"/>
    <!-- ハンド -->
    <circle cx="38" cy="13" r="5" fill="#fff" stroke="#7b2cbf" stroke-width="1"/>
    <rect x="36" y="3" width="2" height="10" fill="#7b2cbf"/>
    <rect x="40" y="3" width="2" height="10" fill="#7b2cbf"/>
  </g>

  <!-- 接続ライン -->
  <g stroke="#7b2cbf" stroke-width="0.5" stroke-dasharray="2,2" fill="none">
    <path d="M55,68 Q40,75 30,80"/>
  </g>

  <!-- 装飾ドット -->
  <g fill="#7b2cbf" opacity="0.6">
    <circle cx="170" cy="30" r="1.5"/>
    <circle cx="180" cy="50" r="1.5"/>
    <circle cx="175" cy="70" r="1.5"/>
    <circle cx="185" cy="90" r="1.5"/>
  </g>
</svg>
